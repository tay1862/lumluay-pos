# ─────────────────────────────────────────────────────────────────────────────
# monitoring/prometheus.yml
# ─────────────────────────────────────────────────────────────────────────────
global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lumluay-api'
    metrics_path: '/v1/health/metrics'
    static_configs:
      - targets: ['api:3000']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']   # nginx-prometheus-exporter sidecar (optional)

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
