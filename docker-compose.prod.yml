version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumluay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lumluay_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lumluay} -d ${POSTGRES_DB:-lumluay_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./lumluay-api
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ./lumluay-api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./lumluay-api/uploads:/app/uploads
    networks:
      - backend
      - frontend
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./lumluay-app/build/web:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend

  # ── Certbot: obtains & renews Let's Encrypt certificates ───────────────────
  # Run once to issue cert:  docker compose -f docker-compose.prod.yml run --rm certbot
  # Auto-renew via cron on VPS: 0 3 * * * /opt/lumluay/scripts/renew-certs.sh
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      certbot certonly --webroot
      -w /var/www/certbot
      -d ${DOMAIN} -d www.${DOMAIN}
      --email ${CERTBOT_EMAIL}
      --agree-tos --no-eff-email --non-interactive
    profiles:
      - certbot

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  certbot_www:

networks:
  backend:
    internal: true
  frontend:
