name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/lumluay-pos
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose --env-file lumluay-api/.env -f docker-compose.prod.yml up -d --build
            docker compose --env-file lumluay-api/.env -f docker-compose.prod.yml exec -T api npm run db:migrate
            echo "✅ Production deployed at $(date)"
