name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'lumluay-app/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'lumluay-app/**'

defaults:
  run:
    working-directory: lumluay-app

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK (dev)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (dev flavor)
        run: flutter build apk --flavor dev -t lib/main_dev.dart --dart-define=APP_FLAVOR=dev

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumluay-dev-apk
          path: lumluay-app/build/app/outputs/flutter-apk/app-dev-release.apk
          retention-days: 14
