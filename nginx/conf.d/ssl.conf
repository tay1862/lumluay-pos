# ─────────────────────────────────────────────────────────────────────────────
# nginx/conf.d/ssl.conf — 18.6.5: Let's Encrypt / TLS Configuration
#
# HOW TO OBTAIN CERTIFICATES (run on the VPS):
#   docker run --rm \
#     -v /etc/letsencrypt:/etc/letsencrypt \
#     -v /var/lib/letsencrypt:/var/lib/letsencrypt \
#     -v /var/www/certbot:/var/www/certbot \
#     certbot/certbot certonly \
#       --webroot -w /var/www/certbot \
#       -d your-domain.com -d www.your-domain.com \
#       --email admin@your-domain.com \
#       --agree-tos --no-eff-email
#
# Auto-renew (add to VPS crontab):
#   0 3 * * * docker run --rm -v /etc/letsencrypt:/etc/letsencrypt \
#     -v /var/lib/letsencrypt:/var/lib/letsencrypt \
#     certbot/certbot renew --quiet && docker kill -s HUP nginx
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
  listen 80;
  server_name kanghan.site www.kanghan.site;

  # ACME challenge for Certbot renewal
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name kanghan.site www.kanghan.site;

  # ── Certificates ──────────────────────────────────────────────────────────
  ssl_certificate     /etc/letsencrypt/live/kanghan.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kanghan.site/privkey.pem;

  # ── TLS hardening ──────────────────────────────────────────────────────────
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers               'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       1d;
  ssl_session_tickets       off;
  ssl_stapling              on;
  ssl_stapling_verify       on;
  resolver                  1.1.1.1 8.8.8.8 valid=300s;
  resolver_timeout          5s;

  # ── Security headers (complement Helmet in NestJS) ─────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options   "nosniff" always;
  add_header X-Frame-Options          "SAMEORIGIN" always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

  # ── Gzip ──────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # ── Internal health check (no TLS overhead) ─────────────────────────────
  location /healthz {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # ── API ──────────────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://api:3000/v1/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # ── WebSocket ─────────────────────────────────────────────────────────────
  location /socket.io/ {
    proxy_pass         http://api:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade     $http_upgrade;
    proxy_set_header   Connection  $connection_upgrade;
    proxy_set_header   Host        $host;
    proxy_set_header   X-Real-IP   $remote_addr;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ── Uploads ───────────────────────────────────────────────────────────────
  location /uploads/ {
    proxy_pass http://api:3000/uploads/;
    proxy_set_header Host        $host;
    proxy_set_header X-Real-IP   $remote_addr;
    client_max_body_size 10M;
  }

  # ── Flutter Web app ───────────────────────────────────────────────────────
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    expires 1d;
    add_header Cache-Control "public, must-revalidate";
  }

  # ── Static assets (fingerprinted, long-lived cache) ───────────────────────
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
    root /usr/share/nginx/html;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }
}
